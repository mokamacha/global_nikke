<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>니케 솔로레이드 3% 예측기</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; text-align: center; padding: 40px 20px; background: #121212; color: #e0e0e0; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: #1e1e1e; border-radius: 20px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        h2 { font-size: 1.5em; color: #ffffff; margin-bottom: 10px; }
        .date-info { font-size: 0.9em; color: #888; margin-bottom: 30px; }
        .score-box { background: #252525; border-radius: 15px; padding: 30px; margin-bottom: 30px; border: 1px solid #444; }
        .score-title { font-size: 1.1em; color: #ffab00; margin-bottom: 10px; }
        .score-value { font-size: 3.5em; color: #ff4757; font-weight: 800; letter-spacing: -1px; }
        .unit { font-size: 0.4em; color: #aaa; margin-left: 5px; }
        .btn { display: block; background: #3742fa; color: white; text-decoration: none; padding: 18px; border-radius: 12px; font-weight: bold; font-size: 1.1em; transition: 0.3s; }
        .btn:hover { background: #5352ed; transform: translateY(-2px); }
        #loading { font-style: italic; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎯 글로벌 솔로레이드 3% 예측</h2>
        <div class="date-info">종료일: 2026. 03. 27. 05:00 (KST)</div>
        
        <div class="score-box">
            <div class="score-title">현재 예상 마감 컷</div>
            <div id="loading">데이터 분석 중...</div>
            <div id="result" style="display:none;">
                <span class="score-value" id="predicted-score">0.00</span>
                <span class="unit">억 점</span>
            </div>
        </div>

        <a href="https://forms.gle/EYKoF3yAbnySNykF8" class="btn" target="_blank">익명 기록 제보하기</a>
        <p style="margin-top: 20px; font-size: 0.8em; color: #555;">* 인구 12만 명 기준, 작열 메타 가중치 적용됨</p>
    </div>

    <script>
        // ⚠️ 아래 주소에 구글 시트에서 복사한 .csv 주소를 붙여넣으세요.
        const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQEkMg-QLbKh4mWI9Ex8bMkKp0A3YdPMFG4l6Ig1QerzAuWuP3V_ajV-6jd4ZkOUQNuK_SsLH96FU_B/pub?gid=830902786&single=true&output=csv";

        async function updateScore() {
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                const rows = data.split('\n');
                
                // 분석 탭의 B4 셀 값 가져오기 (수정: 시트 구조에 따라 인덱스 확인 필요)
                // 아래는 B4 셀(4행 2열)의 값을 가져오는 로직입니다.
                const predictedScore = rows[3].split(',')[1]; 
                
                if(predictedScore && !isNaN(predictedScore)) {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('predicted-score').innerText = parseFloat(predictedScore).toFixed(2);
                }
            } catch (e) {
                document.getElementById('loading').innerText = "데이터 업데이트 중입니다...";
            }
        }
        
        updateScore();
        // 5분마다 자동으로 데이터 갱신
        setInterval(updateScore, 300000);
    </script>
</body>
</html>
